<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Delivery Address</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f5f5f5;
        }

        .header {
            background: white;
            padding: 15px 20px;
            display: flex;
            align-items: center;
            gap: 15px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        .back-btn {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            color: #333;
        }

        .header h1 {
            font-size: 20px;
            color: #333;
            flex: 1;
        }

        .progress-bar {
            height: 4px;
            background: #e0e0e0;
        }

        .progress-fill {
            height: 100%;
            background: #28a745;
            width: 66%;        }

        .container {
            padding: 20px;
            max-width: 600px;
            margin: 0 auto;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 600;
        }

        .required {
            color: #9c27b0;
        }

        input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
            transition: border-color 0.3s;
        }

        input:focus {
            outline: none;
            border-color: #9c27b0;
        }

        input.auto-filled {
            background: #e8f5e9;
            border-color: #28a745;
        }

        .row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .btn-continue {
            width: 100%;            padding: 16px;
            background: #9c27b0;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
            transition: background 0.2s;
        }

        .btn-continue:hover {
            background: #7b1fa2;
        }

        .auto-fill-badge {
            display: inline-block;
            background: #28a745;
            color: white;
            padding: 3px 10px;
            border-radius: 12px;
            font-size: 12px;
            margin-left: 10px;
        }
    </style>
</head>
<body>
    <div class="header">
        <button class="back-btn" onclick="goBack()">←</button>
        <h1>ADD DELIVERY ADDRESS</h1>
    </div>
    
    <div class="progress-bar">
        <div class="progress-fill"></div>
    </div>

    <div class="container">
        <form id="deliveryForm">
            <div class="form-group">
                <label for="pincode">
                    Pincode <span class="required">*</span>
                    <span id="pincodeBadge" class="auto-fill-badge" style="display:none">Auto-filled</span>
                </label>
                <input type="text" id="pincode" required>
            </div>

            <div class="row">
                <div class="form-group">
                    <label for="city">                        District <span class="required">*</span>
                        <span id="districtBadge" class="auto-fill-badge" style="display:none">Auto-filled</span>
                    </label>
                    <input type="text" id="city" required>
                </div>

                <div class="form-group">
                    <label for="state">
                        State <span class="required">*</span>
                        <span id="stateBadge" class="auto-fill-badge" style="display:none">Auto-filled</span>
                    </label>
                    <input type="text" id="state" required>
                </div>
            </div>

            <div class="form-group">
                <label for="houseNo">
                    House no./ Building Name <span class="required">*</span>
                </label>
                <input type="text" id="houseNo" required>
            </div>

            <div class="form-group">
                <label for="roadName">
                    Road Name / Area / Colony <span class="required">*</span>
                </label>
                <input type="text" id="roadName" required>
            </div>

            <button type="submit" class="btn-continue">Continue</button>
        </form>
    </div>

    <script>
        // Load location data if available
        window.addEventListener('load', function() {
            const locationData = JSON.parse(localStorage.getItem('locationData'));
            
            if (locationData && locationData.autoFilled) {
                document.getElementById('pincode').value = locationData.pincode || '';
                document.getElementById('city').value = locationData.district || '';
                document.getElementById('state').value = locationData.state || '';
                
                document.getElementById('pincode').classList.add('auto-filled');
                document.getElementById('city').classList.add('auto-filled');
                document.getElementById('state').classList.add('auto-filled');
                
                document.getElementById('pincodeBadge').style.display = 'inline-block';
                document.getElementById('districtBadge').style.display = 'inline-block';
                document.getElementById('stateBadge').style.display = 'inline-block';            }
        });

        // Form submission - NOW REDIRECTS TO PASTE PRODUCT LINK PAGE
        document.getElementById('deliveryForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const customerData = JSON.parse(localStorage.getItem('customerData')) || {};
            const locationData = JSON.parse(localStorage.getItem('locationData')) || {};
            
            const finalData = {
                ...customerData,
                pincode: document.getElementById('pincode').value,
                district: document.getElementById('city').value,
                state: document.getElementById('state').value,
                houseNo: document.getElementById('houseNo').value,
                roadName: document.getElementById('roadName').value,
                latitude: locationData.latitude || null,
                longitude: locationData.longitude || null
            };
            
            localStorage.setItem('completeAddress', JSON.stringify(finalData));
            
            // REDIRECT TO PASTE PRODUCT LINK PAGE
            window.location.href = 'paste-product-link.html';
        });

        function goBack() {
            window.location.href = 'address-options.html';
        }
    </script>
</body>
</html>
