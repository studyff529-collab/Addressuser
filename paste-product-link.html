<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paste Product Link</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 25px;
            padding: 40px 30px;
            width: 100%;
            max-width: 450px;
            text-align: center;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }
        .link-icon { width: 80px; height: 80px; margin: 0 auto 25px; fill: #667eea; }
        h1 { font-size: 26px; color: #333; margin-bottom: 10px; }
        .subtitle { color: #666; margin-bottom: 25px; }
        .input-group { margin-bottom: 20px; }
        .input-group input {
            width: 100%;
            padding: 15px 20px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 16px;
        }
        .input-group input:focus { outline: none; border-color: #667eea; }
        .btn-done {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
        }
        .btn-done:disabled { background: #ccc; cursor: not-allowed; }        .message {
            font-size: 16px;
            font-weight: 600;
            margin-top: 15px;
            min-height: 24px;
        }
        .message.ok { color: #4caf50; }
        .message.invalid { color: #f5576c; }
        .loading { color: #666; margin-top: 15px; display: none; }
        .loading.show { display: block; }
        .loading-spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            width: 25px;
            height: 25px;
            animation: spin 1s linear infinite;
            margin: 0 auto 10px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="container">
        <svg class="link-icon" viewBox="0 0 24 24">
            <path d="M3.9 12c0-1.71 1.39-3.1 3.1-3.1h4V7H7c-2.76 0-5 2.24-5 5s2.24 5 5 5h4v-1.9H7c-1.71 0-3.1-1.39-3.1-3.1zM8 13h8v-2H8v2zm9-6h-4v1.9h4c1.71 0 3.1 1.39 3.1 3.1s-1.39 3.1-3.1 3.1h-4V17h4c2.76 0 5-2.24 5-5s-2.24-5-5-5z"/>
        </svg>
        
        <h1>Paste your product link here</h1>
        <p class="subtitle">Enter the link to order</p>
        
        <div class="input-group">
            <input type="url" id="productLink" placeholder="Paste your product link here...">
        </div>
        
        <button class="btn-done" id="doneBtn" onclick="verifyAndContinue()">Done</button>
        
        <div class="message" id="message"></div>
        
        <div class="loading" id="loading">
            <div class="loading-spinner"></div>
        </div>
    </div>

    <script>
        // Load products from localStorage (synced from product-links.html PRODUCTS array)
        let products = JSON.parse(localStorage.getItem('products')) || [];
        
        // Verify link and continue
        function verifyAndContinue() {            const link = document.getElementById('productLink').value.trim();
            const message = document.getElementById('message');
            const doneBtn = document.getElementById('doneBtn');
            const loading = document.getElementById('loading');
            
            // Clear previous message
            message.textContent = '';
            message.className = 'message';
            
            // Check if link is empty
            if (!link) {
                message.textContent = 'Invalid';
                message.classList.add('invalid');
                return;
            }
            
            // Show loading
            loading.classList.add('show');
            doneBtn.disabled = true;
            
            // Reload products from localStorage (latest from product-links.html)
            products = JSON.parse(localStorage.getItem('products')) || [];
            
            // Verify link from PRODUCTS array (via localStorage sync)
            const selectedProduct = products.find(p => p.link == link);
            
            if (selectedProduct) {
                // ✅ Link found - OK
                message.textContent = 'OK';
                message.classList.add('ok');
                
                // Save product for order-summary.html
                localStorage.setItem('selectedProduct', JSON.stringify(selectedProduct));
                
                // Redirect after short delay
                setTimeout(() => {
                    window.location.href = 'order-summary.html';
                }, 500);
                
            } else {
                // ❌ Link not found - Invalid (SIMPLE MESSAGE)
                message.textContent = 'Invalid';
                message.classList.add('invalid');
                
                // Reset button
                loading.classList.remove('show');
                doneBtn.disabled = false;
            }
        }
                // Allow Enter key to submit
        document.getElementById('productLink').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                verifyAndContinue();
            }
        });
    </script>
</body>
</html>
